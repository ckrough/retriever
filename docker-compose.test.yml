services:
  postgres-test:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: retriever_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d retriever_test"]
      interval: 3s
      timeout: 3s
      retries: 10
